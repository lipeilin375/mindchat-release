name: 🚀 Tauri Release Builder

# ──────────────────────────────────────────────────────────────────────────────
# 触发方式：
#   1. 推送 tag（如 git tag v1.0.0 && git push origin v1.0.0）
#   2. 手动在 Actions 页面点击 Run workflow，填入参数
# ──────────────────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      target_url:
        description: '要打包的网站 URL（如 https://example.com）'
        required: true
        default: 'https://example.com'
      app_name:
        description: '应用名称（英文，如 MyWebApp）'
        required: true
        default: 'MyWebApp'
      app_version:
        description: '应用版本（如 1.0.0）'
        required: true
        default: '1.0.0'

env:
  TARGET_URL:  ${{ github.event.inputs.target_url  || vars.TARGET_URL  || 'https://example.com' }}
  APP_NAME:    ${{ github.event.inputs.app_name    || vars.APP_NAME    || 'MyWebApp' }}
  APP_VERSION: ${{ github.event.inputs.app_version || '1.0.0' }}

jobs:
  build-tauri:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: 📥 Checkout 仓库
        uses: actions/checkout@v4

      # ── 2. Linux 系统依赖 ──────────────────────────────────────────────────
      - name: 🔧 安装 Linux 系统依赖
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # ── 3. Rust 工具链 ─────────────────────────────────────────────────────
      - name: 🦀 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 📦 缓存 Rust 依赖
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.target }}

      # ── 4. Node.js ─────────────────────────────────────────────────────────
      - name: 🟢 安装 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 5. 用 Python 生成所有项目文件（跨平台，无 shell 差异）────────────
      - name: 🏗️ 生成 Tauri 项目文件
        shell: python3 {0}
        env:
          TARGET_URL:  ${{ env.TARGET_URL }}
          APP_NAME:    ${{ env.APP_NAME }}
          APP_VERSION: ${{ env.APP_VERSION }}
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: |
          import os, json, textwrap, struct, zlib

          url     = os.environ["TARGET_URL"]
          name    = os.environ["APP_NAME"]
          version = os.environ["APP_VERSION"]
          safe_id = "".join(c if c.isalnum() else "." for c in name.lower()).strip(".")
          identifier = f"com.webwrapper.{safe_id}"

          os.makedirs("src-tauri/src",   exist_ok=True)
          os.makedirs("src-tauri/icons", exist_ok=True)
          os.makedirs("dist",            exist_ok=True)

          # ── package.json ──────────────────────────────────────────────────
          pkg = {
            "name": safe_id,
            "version": version,
            "scripts": {"tauri": "tauri"},
            "devDependencies": {"@tauri-apps/cli": "^2"}
          }
          with open("package.json", "w", encoding="utf-8") as f:
            json.dump(pkg, f, indent=2)

          # ── tauri.conf.json ───────────────────────────────────────────────
          # 注意: window url 设为远程地址，frontendDist 仅为满足构建器要求
          conf = {
            "productName": name,
            "version": version,
            "identifier": identifier,
            "build": {
              "frontendDist": "../dist"
            },
            "app": {
              "windows": [
                {
                  "title": name,
                  "width": 1280,
                  "height": 800,
                  "resizable": True,
                  "fullscreen": False,
                  "url": url
                }
              ],
              "withGlobalTauri": False
            },
            "bundle": {
              "active": True,
              "targets": "all",
              "icon": [
                "icons/32x32.png",
                "icons/128x128.png",
                "icons/128x128@2x.png",
                "icons/icon.icns",
                "icons/icon.ico"
              ]
            }
          }
          with open("src-tauri/tauri.conf.json", "w", encoding="utf-8") as f:
            json.dump(conf, f, indent=2)

          # ── Cargo.toml ────────────────────────────────────────────────────
          cargo = textwrap.dedent(f"""\
          [package]
          name = "app"
          version = "{version}"
          description = "{name}"
          authors = ["WebWrapper"]
          edition = "2021"
          rust-version = "1.77.2"

          [lib]
          name = "app_lib"
          crate-type = ["staticlib", "cdylib", "rlib"]

          [build-dependencies]
          tauri-build = {{ version = "2", features = [] }}

          [dependencies]
          tauri = {{ version = "2", features = [] }}
          tauri-plugin-opener = "2"
          serde = {{ version = "1", features = ["derive"] }}
          serde_json = "1"

          [profile.release]
          panic = "abort"
          codegen-units = 1
          lto = true
          opt-level = "s"
          strip = true
          """)
          with open("src-tauri/Cargo.toml", "w", encoding="utf-8") as f:
            f.write(cargo)

          # ── build.rs ──────────────────────────────────────────────────────
          with open("src-tauri/build.rs", "w", encoding="utf-8") as f:
            f.write("fn main() {\n    tauri_build::build()\n}\n")

          # ── src/lib.rs ────────────────────────────────────────────────────
          with open("src-tauri/src/lib.rs", "w", encoding="utf-8") as f:
            f.write(textwrap.dedent("""\
            #[cfg_attr(mobile, tauri::mobile_entry_point)]
            pub fn run() {
                tauri::Builder::default()
                    .plugin(tauri_plugin_opener::init())
                    .run(tauri::generate_context!())
                    .expect("error while running tauri application");
            }
            """))

          # ── src/main.rs ───────────────────────────────────────────────────
          with open("src-tauri/src/main.rs", "w", encoding="utf-8") as f:
            f.write(textwrap.dedent("""\
            #![cfg_attr(not(debug_assertions), windows_subsystem = "windows")]
            fn main() {
                app_lib::run();
            }
            """))

          # ── dist/index.html（占位，Tauri 实际加载远程 URL）───────────────
          with open("dist/index.html", "w", encoding="utf-8") as f:
            f.write(f"<html><body><p>Loading {url} ...</p></body></html>\n")

          # ── 生成图标（纯 Python，零依赖）─────────────────────────────────
          def make_png(size, r=79, g=142, b=247):
              def chunk(tag, data):
                  crc = zlib.crc32(tag + data) & 0xFFFFFFFF
                  return struct.pack(">I", len(data)) + tag + data + struct.pack(">I", crc)
              ihdr = struct.pack(">IIBBBBB", size, size, 8, 2, 0, 0, 0)
              scanline = b"\x00" + bytes([r, g, b]) * size
              idat = zlib.compress(scanline * size, 9)
              return b"\x89PNG\r\n\x1a\n" + chunk(b"IHDR", ihdr) + chunk(b"IDAT", idat) + chunk(b"IEND", b"")

          for fname, sz in [("32x32.png", 32), ("128x128.png", 128),
                             ("128x128@2x.png", 256), ("icon.icns", 512), ("icon.ico", 256)]:
              with open(f"src-tauri/icons/{fname}", "wb") as f:
                  f.write(make_png(sz))

          print("=" * 60)
          print("[OK] All project files generated successfully")
          print(f"   TARGET_URL  = {url}")
          print(f"   APP_NAME    = {name}")
          print(f"   APP_VERSION = {version}")
          print(f"   identifier  = {identifier}")
          print("=" * 60)

      # ── 6. 安装 @tauri-apps/cli ────────────────────────────────────────────
      - name: 📦 安装 Tauri CLI
        run: npm install

      # ── 7. 构建 & 发布到 Release ───────────────────────────────────────────
      - name: 🔨 构建并发布 Tauri 应用
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── macOS 代码签名（可选，不配置则跳过）──────────────────────────
          # APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY:     ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID:                   ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD:             ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID:              ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name || format('v{0}', env.APP_VERSION) }}
          releaseName: '${{ env.APP_NAME }} v__VERSION__'
          releaseBody: |
            ## ${{ env.APP_NAME }} v${{ env.APP_VERSION }}

            🌐 **打包网站**：${{ env.TARGET_URL }}

            ### 📥 下载对应平台安装包

            | 平台 | 推荐文件 |
            |------|---------|
            | Windows | `.msi` 安装包 |
            | macOS Intel (x64) | `x64.dmg` |
            | macOS Apple Silicon | `aarch64.dmg` |
            | Linux | `.AppImage`（免安装）或 `.deb` |

            > **macOS 提示"无法验证开发者"**：右键点击应用 → 打开 → 再次点击打开即可。
          releaseDraft: false
          prerelease: false
          projectPath: '.'
          args: --target ${{ matrix.target }}
